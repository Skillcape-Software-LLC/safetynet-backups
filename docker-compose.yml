services:
  backup-cli:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/cli:latest
    volumes:
      - safetynet_data:/data  # SQLite database (shared with backup-web)
      - ./keys:/keys:ro
      - ./logs:/logs
      # To enable source discovery, mount your Docker volumes parent directory:
      - ~/docker:/browse:ro
    environment:
      - DB_PATH=/data/safetynet.db
      - BACKUP_KEY_PASSPHRASE=ociH00713!
      - BROWSE_ROOT=/browse

  backup-web:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/web:latest
    ports:
      - "5200:8080"
    volumes:
      - safetynet_data:/data  # SQLite database (shared with backup-cli)
      - ./keys:/keys:ro
      - ./logs:/logs
      # To enable source discovery, mount your Docker volumes parent directory:
      - ~/docker:/browse:ro
    environment:
      - DB_PATH=/data/safetynet.db
      - BACKUP_KEY_PASSPHRASE=ociH00713!
      - BROWSE_ROOT=/browse
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

volumes:
  safetynet_data:
