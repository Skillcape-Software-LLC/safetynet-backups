services:
  backup-cli:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/cli:latest
    user: "${PUID:-1000}:${PGID:-1000}"
    command: ["sleep", "infinity"]  # Stay alive for docker exec; backups are scheduled via the web service
    volumes:
      - safetynet_data:/data  # SQLite database (shared with backup-web)
      - ./keys:/keys:ro
      - ./logs:/logs
      # Default Docker named volumes (always mounted, no config needed)
      - /var/lib/docker/volumes:/docker-volumes:ro
      # Set DOCKER_DIR in .env to an optional custom directory (e.g. docker project folders)
      - ${DOCKER_DIR:-/tmp}:/browse:ro
      # Set RESTORE_DIR in .env to the directory where restores should be written
      - ${RESTORE_DIR:-/tmp}:/restores
    environment:
      - DB_PATH=/data/safetynet.db
      - BACKUP_KEY_PASSPHRASE=ociH00713!
      - BROWSE_ROOT=/browse

  backup-web:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/web:latest
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "5200:8080"
    volumes:
      - safetynet_data:/data  # SQLite database (shared with backup-cli)
      - ./keys:/keys:ro
      - ./logs:/logs
      # Default Docker named volumes (always mounted, no config needed)
      - /var/lib/docker/volumes:/docker-volumes:ro
      # Set DOCKER_DIR in .env to an optional custom directory (e.g. docker project folders)
      - ${DOCKER_DIR:-/tmp}:/browse:ro
      # Set RESTORE_DIR in .env to the directory where restores should be written
      - ${RESTORE_DIR:-/tmp}:/restores
    environment:
      - DB_PATH=/data/safetynet.db
      - BACKUP_KEY_PASSPHRASE=ociH00713!
      - BROWSE_ROOT=/browse
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

volumes:
  safetynet_data:
