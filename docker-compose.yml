services:
  backup-cli:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/cli:latest
    volumes:
      - ./config:/config:ro
      - ./keys:/keys:ro
      - ./logs:/logs
      # Add your data mounts here, e.g.:
      # - /mnt/media:/data/media:ro
      # - /home/chad/documents:/data/docs:ro
      # - /opt/docker:/mnt/docker-volumes:ro   # set browse_root: /mnt/docker-volumes in backup.yml to enable source discovery
    environment:
      - CONFIG_PATH=/config/backup.yml
      - BACKUP_KEY_PASSPHRASE=${BACKUP_KEY_PASSPHRASE:-}
    profiles: [cli]

  backup-web:
    image: ghcr.io/skillcape-software-llc/safetynet-backups/web:latest
    ports:
      - "5200:8080"
    volumes:
      - ./config:/config      # rw — UI can edit config
      - ./keys:/keys:ro
      - ./logs:/logs
      # Add your data mounts here, e.g.:
      # - /mnt/media:/data/media:ro
      # - /home/chad/documents:/data/docs:ro
      # - /opt/docker:/mnt/docker-volumes:ro   # set browse_root: /mnt/docker-volumes in backup.yml to enable source discovery
    environment:
      - CONFIG_PATH=/config/backup.yml
      - BACKUP_KEY_PASSPHRASE=${BACKUP_KEY_PASSPHRASE:-}
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
    profiles: [web]
