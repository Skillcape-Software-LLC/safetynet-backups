ssh:
  host: 192.168.1.x
  port: 22
  user: backup-user
  key_path: /keys/id_ed25519        # passphrase via BACKUP_KEY_PASSPHRASE env var

sources:
  - name: media
    path: /data/media
    exclude:
      - "*.tmp"
      - ".cache"
  - name: configs
    path: /data/configs

destination:
  path: /backups/homelab

retention:
  keep_last: 7                       # always keep N most recent, regardless of age
  max_age_days: 30                   # delete anything older than this

compression: optimal                 # optimal | fastest | no_compression

schedule:
  cron: "0 2 * * *"                  # null = one-shot mode
